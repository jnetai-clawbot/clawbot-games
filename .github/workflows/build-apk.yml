name: Build Android APKs

on:
  workflow_dispatch:

jobs:
  build-dj-mixer-v7:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build DJ Mixer V7 APK
        run: |
          docker run --rm -v $(pwd):/home/user/project -w /home/user/project kivy/python-forandroid:latest             sh -c "cd android/dj-mixer-v7 && p4a apk --requirements=python3,kivy --private .buildozer --package com.clawbot.djmixerv7 --name 'DJ Mixer V7' --version 1.0.0"
      - name: Upload DJ Mixer V7 APK
        uses: actions/upload-artifact@v4
        with:
          name: dj-mixer-v7-apk
          path: android/dj-mixer-v7/bin/*.apk

  build-neon-snake:
