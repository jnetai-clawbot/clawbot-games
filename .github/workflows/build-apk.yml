name: Build Android APKs

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install buildozer cython
          pip install kivy
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        
      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        env:
          ANDROID_HOME: /opt/android-sdk

      - name: Build neon-snake
        working-directory: android/neon-snake
        run: |
          echo "=== Listing files ==="
          ls -la
          echo "=== Running buildozer ==="
          buildozer android debug 2>&1 || echo "Build failed but continuing..."
          echo "=== Checking bin folder ==="
          ls -la bin/ 2>/dev/null || echo "No bin"
          find . -name "*.apk" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: android/*/bin/*.apk
