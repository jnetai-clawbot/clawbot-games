          echo "=== Building DJ Mixer V7 ==="
          ls -la
          buildozer android debug 2>&1 | tee build.log
          echo "===BUILD LOG END==="
          echo "=== Checking for APK ==="
          ls -la bin/ 2>/dev/null || echo "No bin folder"
          ls -la .buildozer/ 2>/dev/null || echo "No .buildozer"
      - name: Upload DJ Mixer V7 APK
        uses: actions/upload-artifact@v4
        with:
          name: dj-mixer-v7-apk
