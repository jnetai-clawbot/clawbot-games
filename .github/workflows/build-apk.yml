name: Build Android APKs

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install buildozer cython kivy
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Build neon-snake
        working-directory: android/neon-snake
        run: |
          pwd
          ls -la
          buildozer android debug || true
          echo "=== Looking for APK ==="
          find /home/runner/work -name "*.apk" 2>/dev/null
          ls -la bin/ 2>/dev/null || echo "No bin"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: android/*/bin/*.apk
