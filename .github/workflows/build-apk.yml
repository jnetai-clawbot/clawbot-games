name: Build Android APKs

on:
  push:
    paths:
      - 'android/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install buildozer==1.5.0 cython==0.29.36
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Build neon-snake (simple game)
        run: |
          cd android/neon-snake
          ls -la
          buildozer android debug --verbose 2>&1 | tail -50
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: android/neon-snake/bin/*.apk
