<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawBot Fitness</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #f43f5e;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --success: #22c55e;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary), #fb7185);
            padding: 30px;
            text-align: center;
            border-radius: 0 0 30px 30px;
        }
        
        .header h1 { font-size: 1.8em; margin-bottom: 10px; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-icon { font-size: 2em; margin-bottom: 10px; }
        .stat-value { font-size: 1.8em; font-weight: bold; }
        .stat-label { font-size: 0.8em; opacity: 0.8; }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .workout-card {
            background: var(--card);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
        }
        
        .workout-card h3 { margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        .exercise {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--bg);
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .exercise-name { font-weight: bold; }
        .exercise-sets { font-size: 0.85em; color: var(--muted); }
        
        .check-btn {
            width: 30px;
            height: 30px;
            border: 2px solid var(--muted);
            border-radius: 50%;
            background: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .check-btn.completed {
            background: var(--success);
            border-color: var(--success);
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .btn-primary { background: var(--primary); color: white; }
        
        .quick-add {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        
        .quick-btn {
            padding: 15px;
            background: var(--bg);
            border: 2px solid transparent;
            border-radius: 10px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .quick-btn:hover { border-color: var(--primary); }
        .quick-btn span { display: block; font-size: 1.5em; }
        
        .history {
            margin-top: 30px;
        }
        
        .history-item {
            background: var(--card);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        
        .streak { text-align: center; padding: 20px; }
        .streak-value { font-size: 3em; font-weight: bold; color: var(--primary); }
        .streak-label { color: var(--muted); }
    </style>
</head>
<body>
    <div class="header">
        <h1>💪 ClawBot Fitness</h1>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-icon">🔥</div>
                <div class="stat-value" id="calories">0</div>
                <div class="stat-label">Calories</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏱️</div>
                <div class="stat-value" id="minutes">0</div>
                <div class="stat-label">Minutes</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🏋️</div>
                <div class="stat-value" id="workouts">0</div>
                <div class="stat-label">Workouts</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚡</div>
                <div class="stat-value" id="streak">0</div>
                <div class="stat-label">Day Streak</div>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="workout-card">
            <h3>🏃 Today's Workout</h3>
            <div id="exercises"></div>
            <button class="btn btn-primary" onclick="completeWorkout()">Complete Workout</button>
        </div>
        
        <div class="workout-card">
            <h3>⚡ Quick Log</h3>
            <div class="quick-add">
                <button class="quick-btn" onclick="logActivity('Running', 10, 100)">
                    <span>🏃</span>Run 10min
                </button>
                <button class="quick-btn" onclick="logActivity('Walking', 15, 50)">
                    <span>🚶</span>Walk 15min
                </button>
                <button class="quick-btn" onclick="logActivity('Cycling', 20, 150)">
                    <span>🚴</span>Cycle 20min
                </button>
                <button class="quick-btn" onclick="logActivity('Pushups', 5, 50)">
                    <span>💪</span>Pushups
                </button>
                <button class="quick-btn" onclick="logActivity('Squats', 5, 50)">
                    <span>🦵</span>Squats
                </button>
                <button class="quick-btn" onclick="logActivity('Plank', 2, 30)">
                    <span>🧘</span>Plank 2min
                </button>
            </div>
        </div>
        
        <div class="history">
            <h3>📅 Recent Activity</h3>
            <div id="historyList"></div>
        </div>
    </div>
    
    <script>
        let history = JSON.parse(localStorage.getItem('clawbot-fitness') || '[]');
        let todayExercises = [
            { name: 'Jumping Jacks', sets: '3x30 sec', done: false },
            { name: 'Pushups', sets: '3x15', done: false },
            { name: 'Squats', sets: '3x20', done: false },
            { name: 'Plank', sets: '3x30 sec', done: false },
            { name: 'Lunges', sets: '3x12 each', done: false }
        ];
        
        function renderExercises() {
            document.getElementById('exercises').innerHTML = todayExercises.map((ex, i) => `
                <div class="exercise">
                    <div>
                        <div class="exercise-name">${ex.name}</div>
                        <div class="exercise-sets">${ex.sets}</div>
                    </div>
                    <button class="check-btn ${ex.done ? 'completed' : ''}" onclick="toggleExercise(${i})">
                        ${ex.done ? '✓' : ''}
                    </button>
                </div>
            `).join('');
        }
        
        function toggleExercise(i) {
            todayExercises[i].done = !todayExercises[i].done;
            renderExercises();
        }
        
        function completeWorkout() {
            const doneCount = todayExercises.filter(e => e.done).length;
            if (doneCount === 0) return alert('Complete at least one exercise!');
            
            const calories = doneCount * 25;
            const minutes = 15;
            
            history.unshift({
                date: new Date().toISOString(),
                type: 'Workout',
                duration: minutes,
                calories: calories,
                exercises: doneCount
            });
            
            // Reset exercises
            todayExercises.forEach(e => e.done = false);
            
            save();
            alert(`🎉 Workout complete! +${calories} cal, ${minutes} min`);
        }
        
        function logActivity(name, minutes, calories) {
            history.unshift({
                date: new Date().toISOString(),
                type: name,
                duration: minutes,
                calories: calories,
                exercises: 1
            });
            
            save();
            alert(`✅ Logged: ${name} (+${calories} cal)`);
        }
        
        function save() {
            localStorage.setItem('clawbot-fitness', JSON.stringify(history));
            updateStats();
        }
        
        function updateStats() {
            const totalCal = history.reduce((sum, h) => sum + h.calories, 0);
            const totalMin = history.reduce((sum, h) => sum + h.duration, 0);
            const totalWorkouts = history.length;
            
            // Calculate streak
            let streak = 0;
            const today = new Date().toDateString();
            let checkDate = new Date();
            
            while (true) {
                const dateStr = checkDate.toDateString();
                const hasActivity = history.some(h => new Date(h.date).toDateString() === dateStr);
                
                if (hasActivity) {
                    streak++;
                    checkDate.setDate(checkDate.getDate() - 1);
                } else if (dateStr !== today) {
                    break;
                } else {
                    break;
                }
                
                if (streak > 365) break;
            }
            
            document.getElementById('calories').textContent = totalCal;
            document.getElementById('minutes').textContent = totalMin;
            document.getElementById('workouts').textContent = totalWorkouts;
            document.getElementById('streak').textContent = streak;
            
            // History list
            document.getElementById('historyList').innerHTML = history.slice(0, 10).map(h => `
                <div class="history-item">
                    <div>
                        <strong>${h.type}</strong>
                        <div style="font-size:0.8em;color:var(--muted)">${new Date(h.date).toLocaleDateString()}</div>
                    </div>
                    <div style="text-align:right">
                        <div>${h.calories} cal</div>
                        <div style="font-size:0.8em;color:var(--muted)">${h.duration} min</div>
                    </div>
                </div>
            `).join('');
        }
        
        renderExercises();
        updateStats();
    </script>
</body>
</html>
