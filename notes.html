<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawBot Notes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --accent: #818cf8;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 { font-size: 1.5em; }
        
        .search {
            padding: 12px 20px;
            background: var(--card);
            border: none;
            border-radius: 10px;
            color: var(--text);
            font-size: 1em;
            width: 300px;
            max-width: 100%;
        }
        
        .notes-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .note-card {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 2px solid transparent;
        }
        
        .note-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2);
            border-color: var(--primary);
        }
        
        .note-title {
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        
        .note-preview {
            color: var(--muted);
            font-size: 0.9em;
            line-height: 1.5;
            margin-bottom: 15px;
            max-height: 80px;
            overflow: hidden;
        }
        
        .note-date {
            font-size: 0.75em;
            color: var(--muted);
        }
        
        .note-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .tag {
            padding: 4px 12px;
            background: rgba(99, 102, 241, 0.2);
            border-radius: 15px;
            font-size: 0.75em;
            color: var(--accent);
        }
        
        .add-note {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.5);
            transition: transform 0.3s;
            border: none;
        }
        
        .add-note:hover { transform: scale(1.1); }
        
        /* Editor Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
        }
        
        .modal.show { display: block; }
        
        .editor {
            background: var(--card);
            max-width: 800px;
            margin: 50px auto;
            border-radius: 20px;
            padding: 30px;
            height: calc(100vh - 100px);
            display: flex;
            flex-direction: column;
        }
        
        .editor input {
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 20px;
            width: 100%;
            outline: none;
        }
        
        .editor textarea {
            flex: 1;
            background: var(--bg);
            border: none;
            border-radius: 10px;
            padding: 20px;
            color: var(--text);
            font-size: 1em;
            line-height: 1.8;
            resize: none;
            outline: none;
        }
        
        .editor-bar {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
        }
        
        .editor-bar input[type="text"] {
            background: var(--bg);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9em;
            width: 200px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
        }
        
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-secondary { background: var(--bg); color: var(--text); }
        
        .empty {
            text-align: center;
            padding: 60px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📝 ClawBot Notes</h1>
        <input type="text" class="search" placeholder="Search notes..." id="searchNotes">
    </div>
    
    <div class="notes-container" id="notesContainer">
        <div class="empty">No notes yet. Click + to create one!</div>
    </div>
    
    <button class="add-note" onclick="openEditor()">+</button>
    
    <div class="modal" id="editorModal">
        <div class="editor">
            <input type="text" id="noteTitle" placeholder="Note title...">
            <textarea id="noteContent" placeholder="Start writing..."></textarea>
            <div class="editor-bar">
                <input type="text" id="noteTags" placeholder="Tags (comma separated)">
                <div>
                    <button class="btn btn-danger" onclick="deleteNote()">Delete</button>
                    <button class="btn btn-secondary" onclick="closeEditor()">Cancel</button>
                    <button class="btn btn-primary" onclick="saveNote()">Save</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let notes = JSON.parse(localStorage.getItem('clawbot-notes') || '[]');
        let editingId = null;
        
        function saveToStorage() {
            localStorage.setItem('clawbot-notes', JSON.stringify(notes));
            renderNotes();
        }
        
        function renderNotes() {
            const container = document.getElementById('notesContainer');
            const search = document.getElementById('searchNotes').value.toLowerCase();
            
            let filtered = notes;
            if (search) {
                filtered = notes.filter(n => 
                    n.title.toLowerCase().includes(search) || 
                    n.content.toLowerCase().includes(search) ||
                    n.tags.some(t => t.toLowerCase().includes(search))
                );
            }
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty">No notes found</div>';
                return;
            }
            
            container.innerHTML = filtered.map(note => `
                <div class="note-card" onclick="openEditor(${note.id})">
                    <div class="note-title">
                        ${note.title || 'Untitled'}
                    </div>
                    <div class="note-preview">${note.content.substring(0, 100)}...</div>
                    <div class="note-tags">
                        ${note.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                    </div>
                    <div class="note-date">${new Date(note.date).toLocaleDateString()}</div>
                </div>
            `).join('');
        }
        
        function openEditor(id = null) {
            editingId = id;
            const note = notes.find(n => n.id === id);
            
            document.getElementById('noteTitle').value = note ? note.title : '';
            document.getElementById('noteContent').value = note ? note.content : '';
            document.getElementById('noteTags').value = note ? note.tags.join(', ') : '';
            
            document.getElementById('editorModal').classList.add('show');
        }
        
        function closeEditor() {
            document.getElementById('editorModal').classList.remove('show');
            editingId = null;
        }
        
        function saveNote() {
            const title = document.getElementById('noteTitle').value || 'Untitled';
            const content = document.getElementById('noteContent').value;
            const tags = document.getElementById('noteTags').value.split(',').map(t => t.trim()).filter(t => t);
            
            if (editingId) {
                const note = notes.find(n => n.id === editingId);
                note.title = title;
                note.content = content;
                note.tags = tags;
                note.date = Date.now();
            } else {
                notes.unshift({
                    id: Date.now(),
                    title,
                    content,
                    tags,
                    date: Date.now()
                });
            }
            
            saveToStorage();
            closeEditor();
        }
        
        function deleteNote() {
            if (editingId && confirm('Delete this note?')) {
                notes = notes.filter(n => n.id !== editingId);
                saveToStorage();
                closeEditor();
            }
        }
        
        document.getElementById('searchNotes').addEventListener('input', renderNotes);
        
        renderNotes();
    </script>
</body>
</html>
