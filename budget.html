<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawBot Budget</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --muted: #94a3b8;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary), #059669);
            padding: 25px;
            text-align: center;
        }
        
        .balance-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin: -50px auto 20px;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .balance-label {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 5px;
        }
        
        .balance-amount {
            font-size: 2.5em;
            font-weight: bold;
        }
        
        .income-expense {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }
        
        .ie-box {
            text-align: center;
        }
        
        .ie-label { font-size: 0.8em; color: var(--muted); }
        .ie-amount { font-size: 1.3em; font-weight: bold; margin-top: 5px; }
        .income { color: var(--primary); }
        .expense { color: var(--danger); }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0 15px;
        }
        
        .add-transaction {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .add-transaction h3 { margin-bottom: 15px; }
        
        input, select {
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            border: 2px solid #334155;
            border-radius: 10px;
            background: var(--bg);
            color: var(--text);
            font-size: 1em;
            outline: none;
        }
        
        input:focus, select:focus { border-color: var(--primary); }
        
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn:hover { transform: scale(1.02); }
        .btn-primary { background: var(--primary); color: white; }
        
        .transactions {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
        }
        
        .transaction {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #334155;
        }
        
        .transaction:last-child { border-bottom: none; }
        
        .t-info { flex: 1; }
        .t-name { font-weight: bold; margin-bottom: 3px; }
        .t-date { font-size: 0.8em; color: var(--muted); }
        .t-amount { font-weight: bold; font-size: 1.1em; }
        .t-amount.plus { color: var(--primary); }
        .t-amount.minus { color: var(--danger); }
        
        .chart-container {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
        }
        
        .chart-bar {
            display: flex;
            align-items: center;
            margin: 10px 0;
        }
        
        .chart-label { width: 80px; font-size: 0.9em; }
        .chart-bar-inner {
            flex: 1;
            height: 25px;
            background: #334155;
            border-radius: 5px;
            overflow: hidden;
        }
        
        .chart-fill {
            height: 100%;
            border-radius: 5px;
        }
        
        .chart-value { width: 60px; text-align: right; font-size: 0.9em; }
        
        .empty {
            text-align: center;
            padding: 40px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💰 ClawBot Budget</h1>
    </div>
    
    <div class="balance-card">
        <div class="balance-label">Total Balance</div>
        <div class="balance-amount" id="balance">£0.00</div>
        
        <div class="income-expense">
            <div class="ie-box">
                <div class="ie-label">Income</div>
                <div class="ie-amount income" id="income">+£0.00</div>
            </div>
            <div class="ie-box">
                <div class="ie-label">Expense</div>
                <div class="ie-amount expense" id="expense">-£0.00</div>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="add-transaction">
            <h3>➕ Add Transaction</h3>
            <input type="text" id="desc" placeholder="Description (e.g. Salary, Food)">
            <input type="number" id="amount" placeholder="Amount" step="0.01">
            <select id="type">
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
            <button class="btn btn-primary" onclick="addTransaction()">Add Transaction</button>
        </div>
        
        <div class="section-title">
            <h3>📋 History</h3>
            <button onclick="clearAll()" style="background:none;border:none;color:var(--muted);cursor:pointer;">Clear All</button>
        </div>
        
        <div class="transactions" id="transactions">
            <div class="empty">No transactions yet</div>
        </div>
        
        <div class="chart-container">
            <h3>📊 This Month</h3>
            <div id="chart"></div>
        </div>
    </div>
    
    <script>
        let transactions = JSON.parse(localStorage.getItem('clawbot-budget') || '[]');
        
        function save() {
            localStorage.setItem('clawbot-budget', JSON.stringify(transactions));
            updateUI();
        }
        
        function addTransaction() {
            const desc = document.getElementById('desc').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const type = document.getElementById('type').value;
            
            if (!desc || !amount) return alert('Please fill all fields');
            
            transactions.unshift({
                id: Date.now(),
                desc,
                amount: type === 'expense' ? -amount : amount,
                date: new Date().toISOString()
            });
            
            document.getElementById('desc').value = '';
            document.getElementById('amount').value = '';
            
            save();
        }
        
        function deleteTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            save();
        }
        
        function clearAll() {
            if (confirm('Clear all transactions?')) {
                transactions = [];
                save();
            }
        }
        
        function updateUI() {
            const total = transactions.reduce((sum, t) => sum + t.amount, 0);
            const income = transactions.filter(t => t.amount > 0).reduce((sum, t) => sum + t.amount, 0);
            const expense = transactions.filter(t => t.amount < 0).reduce((sum, t) => sum + Math.abs(t.amount), 0);
            
            document.getElementById('balance').textContent = `£${total.toFixed(2)}`;
            document.getElementById('income').textContent = `+£${income.toFixed(2)}`;
            document.getElementById('expense').textContent = `-£${expense.toFixed(2)}`;
            
            const list = document.getElementById('transactions');
            if (transactions.length === 0) {
                list.innerHTML = '<div class="empty">No transactions yet</div>';
            } else {
                list.innerHTML = transactions.map(t => `
                    <div class="transaction">
                        <div class="t-info">
                            <div class="t-name">${t.desc}</div>
                            <div class="t-date">${new Date(t.date).toLocaleDateString()}</div>
                        </div>
                        <div class="t-amount ${t.amount >= 0 ? 'plus' : 'minus'}" onclick="deleteTransaction(${t.id})">
                            ${t.amount >= 0 ? '+' : ''}£${Math.abs(t.amount).toFixed(2)}
                        </div>
                    </div>
                `).join('');
            }
            
            // Simple chart
            const categories = {};
            transactions.filter(t => t.amount < 0).forEach(t => {
                const cat = t.desc;
                categories[cat] = (categories[cat] || 0) + Math.abs(t.amount);
            });
            
            const sorted = Object.entries(categories).sort((a, b) => b[1] - a[1]).slice(0, 5);
            const max = sorted.length > 0 ? sorted[0][1] : 1;
            
            const chart = document.getElementById('chart');
            if (sorted.length === 0) {
                chart.innerHTML = '<div class="empty">No expenses yet</div>';
            } else {
                chart.innerHTML = sorted.map(([cat, amt]) => `
                    <div class="chart-bar">
                        <div class="chart-label">${cat.substring(0, 10)}</div>
                        <div class="chart-bar-inner">
                            <div class="chart-fill" style="width: ${(amt/max)*100}%; background: var(--danger);"></div>
                        </div>
                        <div class="chart-value">£${amt.toFixed(0)}</div>
                    </div>
                `).join('');
            }
        }
        
        updateUI();
    </script>
</body>
</html>
