<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawBot Tasks - Todo App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 30px 20px;
            text-align: center;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.3);
        }
        
        .header h1 { font-size: 1.8em; margin-bottom: 5px; }
        .header p { opacity: 0.8; }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 0.8em;
            color: var(--muted);
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: var(--card);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        
        input, select {
            flex: 1;
            padding: 15px;
            border: 2px solid transparent;
            border-radius: 10px;
            background: var(--bg);
            color: var(--text);
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }
        
        input:focus { border-color: var(--primary); }
        
        .add-btn {
            padding: 15px 25px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.5em;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }
        
        .add-btn:hover {
            background: var(--secondary);
            transform: scale(1.05);
        }
        
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        
        .filter {
            padding: 8px 16px;
            background: var(--card);
            border: none;
            border-radius: 20px;
            color: var(--muted);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }
        
        .filter.active {
            background: var(--primary);
            color: white;
        }
        
        .task-list { list-style: none; }
        
        .task {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            animation: slideIn 0.3s ease;
            border-left: 4px solid var(--primary);
        }
        
        .task.completed {
            opacity: 0.5;
            border-left-color: var(--success);
        }
        
        .task.high { border-left-color: var(--danger); }
        .task.medium { border-left-color: #f59e0b; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .checkbox {
            width: 28px;
            height: 28px;
            border: 3px solid var(--muted);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        
        .task.completed .checkbox {
            background: var(--success);
            border-color: var(--success);
        }
        
        .checkbox::after {
            content: '✓';
            color: white;
            display: none;
        }
        
        .task.completed .checkbox::after { display: block; }
        
        .task-content { flex: 1; }
        
        .task-title {
            font-size: 1.1em;
            margin-bottom: 5px;
        }
        
        .task.completed .task-title {
            text-decoration: line-through;
        }
        
        .task-meta {
            font-size: 0.8em;
            color: var(--muted);
            display: flex;
            gap: 15px;
        }
        
        .priority {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7em;
            text-transform: uppercase;
        }
        
        .priority.high { background: var(--danger); }
        .priority.medium { background: #f59e0b; }
        .priority.low { background: var(--success); }
        
        .delete-btn {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.5em;
            cursor: pointer;
            padding: 5px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .task:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: var(--danger); }
        
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }
        
        .empty-icon { font-size: 4em; margin-bottom: 20px; }
        
        /* FAB */
        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            color: white;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.5);
            cursor: pointer;
        }
        
        /* PWA Install Prompt */
        .install-prompt {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
            display: none;
        }
        
        @media (display-mode: standalone) {
            .install-prompt { display: none !important; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📋 ClawBot Tasks</h1>
        <p>Stay organized, get things done</p>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="total">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="completed">0</div>
                <div class="stat-label">Done</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="pending">0</div>
                <div class="stat-label">Pending</div>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Add a new task...">
            <select id="priority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
            </select>
            <button class="add-btn" onclick="addTask()">+</button>
        </div>
        
        <div class="filters">
            <button class="filter active" onclick="filterTasks('all')">All</button>
            <button class="filter" onclick="filterTasks('pending')">Pending</button>
            <button class="filter" onclick="filterTasks('completed')">Completed</button>
            <button class="filter" onclick="filterTasks('high')">🔥 High</button>
        </div>
        
        <ul class="task-list" id="taskList">
            <div class="empty">
                <div class="empty-icon">📝</div>
                <p>No tasks yet. Add one above!</p>
            </div>
        </ul>
    </div>
    
    <div class="install-prompt" id="installPrompt">
        <span>Install ClawBot Tasks as an app?</span>
        <div>
            <button onclick="dismissInstall()" style="background:none;border:none;color:var(--muted);margin-right:15px;">Not now</button>
            <button onclick="installApp()" style="background:var(--primary);color:white;border:none;padding:8px 16px;border-radius:8px;">Install</button>
        </div>
    </div>
    
    <script>
        let tasks = JSON.parse(localStorage.getItem('clawbot-tasks') || '[]');
        let currentFilter = 'all';
        
        function saveTasks() {
            localStorage.setItem('clawbot-tasks', JSON.stringify(tasks));
            renderTasks();
        }
        
        function addTask() {
            const input = document.getElementById('taskInput');
            const priority = document.getElementById('priority');
            const title = input.value.trim();
            
            if (!title) return;
            
            const task = {
                id: Date.now(),
                title: title,
                priority: priority.value,
                completed: false,
                created: new Date().toISOString()
            };
            
            tasks.unshift(task);
            input.value = '';
            saveTasks();
        }
        
        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
            }
        }
        
        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
        }
        
        function filterTasks(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.toLowerCase().includes(filter) || 
                    (filter === 'all' && btn.textContent === 'All') ||
                    (filter === 'pending' && btn.textContent === 'Pending') ||
                    (filter === 'completed' && btn.textContent === 'Completed'));
            });
            
            if (filter === 'all') document.querySelectorAll('.filter')[0].classList.add('active');
            else if (filter === 'pending') document.querySelectorAll('.filter')[1].classList.add('active');
            else if (filter === 'completed') document.querySelectorAll('.filter')[2].classList.add('active');
            else if (filter === 'high') document.querySelectorAll('.filter')[3].classList.add('active');
            
            renderTasks();
        }
        
        function renderTasks() {
            const list = document.getElementById('taskList');
            
            let filtered = tasks;
            if (currentFilter === 'pending') filtered = tasks.filter(t => !t.completed);
            else if (currentFilter === 'completed') filtered = tasks.filter(t => t.completed);
            else if (currentFilter === 'high') filtered = tasks.filter(t => t.priority === 'high');
            
            // Update stats
            document.getElementById('total').textContent = tasks.length;
            document.getElementById('completed').textContent = tasks.filter(t => t.completed).length;
            document.getElementById('pending').textContent = tasks.filter(t => !t.completed).length;
            
            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty">
                        <div class="empty-icon">📝</div>
                        <p>No tasks found</p>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = filtered.map(task => `
                <li class="task ${task.completed ? 'completed' : ''} ${task.priority}">
                    <div class="checkbox" onclick="toggleTask(${task.id})"></div>
                    <div class="task-content">
                        <div class="task-title">${task.title}</div>
                        <div class="task-meta">
                            <span class="priority ${task.priority}">${task.priority}</span>
                            <span>${new Date(task.created).toLocaleDateString()}</span>
                        </div>
                    </div>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">×</button>
                </li>
            `).join('');
        }
        
        // Enter key to add task
        document.getElementById('taskInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') addTask();
        });
        
        // PWA Setup
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installPrompt').style.display = 'flex';
        });
        
        function installApp() {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => {
                document.getElementById('installPrompt').style.display = 'none';
            });
        }
        
        function dismissInstall() {
            document.getElementById('installPrompt').style.display = 'none';
        }
        
        // Initial render
        renderTasks();
    </script>
</body>
</html>
