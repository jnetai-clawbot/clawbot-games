<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoVault - Portfolio Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { 
            --primary: #f7931a; 
            --bg: #0d1117; 
            --card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --green: #3fb950;
            --red: #f85149;
            --accent: #58a6ff;
        }
        body { 
            font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh;
            padding: 20px;
            background-image: 
                radial-gradient(ellipse at 10% 20%, rgba(247, 147, 26, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(88, 166, 255, 0.1) 0%, transparent 50%);
        }
        
        .header { 
            text-align: center; 
            margin-bottom: 30px;
            padding: 30px;
            background: linear-gradient(135deg, var(--card), #1a2332);
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        .header h1 { 
            font-size: 2.5em; 
            background: linear-gradient(90deg, var(--primary), #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .header .tagline { color: var(--text); opacity: 0.7; }
        
        .portfolio-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .summary-card {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--border);
        }
        .summary-card .label { color: var(--text); opacity: 0.7; font-size: 0.9em; margin-bottom: 5px; }
        .summary-card .value { font-size: 1.8em; font-weight: bold; }
        .summary-card .value.green { color: var(--green); }
        .summary-card .value.red { color: var(--red); }
        
        .portfolio-chart {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .chart-title { font-size: 1.2em; font-weight: bold; }
        .time-filters { display: flex; gap: 10px; }
        .time-filters button {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s;
        }
        .time-filters button.active, .time-filters button:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: #000;
        }
        
        .holdings-section { margin-bottom: 30px; }
        .section-title { font-size: 1.3em; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .add-btn {
            padding: 8px 20px;
            background: var(--green);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .add-btn:hover { transform: scale(1.05); }
        
        .holdings-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .holding-card {
            background: var(--card);
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }
        .holding-card:hover { border-color: var(--primary); transform: translateX(5px); }
        .holding-icon { 
            width: 45px; 
            height: 45px; 
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            background: linear-gradient(135deg, var(--primary), #ffd700);
        }
        .holding-info { flex: 1; }
        .holding-name { font-weight: bold; font-size: 1.1em; }
        .holding-amount { color: var(--text); opacity: 0.7; font-size: 0.9em; }
        .holding-value { text-align: right; }
        .holding-price { font-weight: bold; font-size: 1.1em; }
        .holding-change { font-size: 0.9em; }
        .holding-change.green { color: var(--green); }
        .holding-change.red { color: var(--red); }
        
        .add-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .add-modal.show { display: flex; }
        .modal-content {
            background: var(--card);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--border);
        }
        .modal-title { font-size: 1.5em; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text); opacity: 0.7; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1em;
        }
        .form-group input:focus { outline: none; border-color: var(--primary); }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-cancel { background: var(--border); color: var(--text); }
        .btn-add { background: var(--primary); color: #000; }
        
        .transactions-section { margin-top: 30px; }
        .transaction-list { display: flex; flex-direction: column; gap: 8px; }
        .transaction {
            background: var(--card);
            padding: 12px 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
        }
        .transaction-type { padding: 4px 10px; border-radius: 5px; font-size: 0.8em; font-weight: bold; }
        .transaction-type.buy { background: rgba(63, 185, 80, 0.2); color: var(--green); }
        .transaction-type.sell { background: rgba(248, 81, 73, 0.2); color: var(--red); }
        
        .top-gainers {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
        .gainer-card {
            background: var(--card);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .gainer-card .icon { font-size: 1.5em; margin-bottom: 5px; }
        .gainer-card .name { font-size: 0.9em; }
        .gainer-card .change { color: var(--green); font-weight: bold; }
        
        @media (max-width: 600px) {
            .header h1 { font-size: 1.8em; }
            .portfolio-summary { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💰 CryptoVault</h1>
        <p class="tagline">Track your crypto portfolio with real-time prices</p>
    </div>
    
    <div class="portfolio-summary">
        <div class="summary-card">
            <div class="label">Total Portfolio Value</div>
            <div class="value" id="totalValue">$0.00</div>
        </div>
        <div class="summary-card">
            <div class="label">24h Change</div>
            <div class="value green" id="totalChange">+$0.00 (0%)</div>
        </div>
        <div class="summary-card">
            <div class="label">Best Performer</div>
            <div class="value" id="bestPerformer">-</div>
        </div>
        <div class="summary-card">
            <div class="label">Total Profit/Loss</div>
            <div class="value" id="totalPnL">$0.00</div>
        </div>
    </div>
    
    <div class="portfolio-chart">
        <div class="chart-header">
            <span class="chart-title">📈 Portfolio Performance</span>
            <div class="time-filters">
                <button class="active" onclick="setTimeframe('24h')">24H</button>
                <button onclick="setTimeframe('7d')">7D</button>
                <button onclick="setTimeframe('30d')">30D</button>
                <button onclick="setTimeframe('all')">ALL</button>
            </div>
        </div>
        <canvas id="chart" height="150"></canvas>
    </div>
    
    <div class="holdings-section">
        <div class="section-title">
            <span>💼 Your Holdings</span>
            <button class="add-btn" onclick="showAddModal()">+ Add</button>
        </div>
        <div class="holdings-list" id="holdingsList"></div>
    </div>
    
    <div class="transactions-section">
        <div class="section-title">📜 Recent Transactions</div>
        <div class="transaction-list" id="transactionList"></div>
    </div>
    
    <div class="holdings-section">
        <div class="section-title">🔥 Top Gainers (24h)</div>
        <div class="top-gainers" id="topGainers"></div>
    </div>
    
    <!-- Add Modal -->
    <div class="add-modal" id="addModal">
        <div class="modal-content">
            <div class="modal-title">Add Holding</div>
            <div class="form-group">
                <label>Cryptocurrency</label>
                <select id="cryptoSelect"></select>
            </div>
            <div class="form-group">
                <label>Amount</label>
                <input type="number" id="amount" placeholder="0.00" step="any">
            </div>
            <div class="form-group">
                <label>Buy Price (USD)</label>
                <input type="number" id="buyPrice" placeholder="0.00" step="any">
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="hideAddModal()">Cancel</button>
                <button class="btn-add" onclick="addHolding()">Add</button>
            </div>
        </div>
    </div>

    <script>
        // Crypto data
        const cryptoData = {
            BTC: { name: 'Bitcoin', symbol: 'BTC', icon: '₿', color: '#f7931a', price: 67432.50, change: 2.34 },
            ETH: { name: 'Ethereum', symbol: 'ETH', icon: 'Ξ', color: '#627eea', price: 3456.78, change: 1.89 },
            BNB: { name: 'BNB', symbol: 'BNB', icon: '◈', color: '#f3ba2f', price: 598.32, change: -0.45 },
            SOL: { name: 'Solana', symbol: 'SOL', icon: '◎', color: '#9945ff', price: 178.45, change: 5.67 },
            XRP: { name: 'Ripple', symbol: 'XRP', icon: '✕', color: '#23292f', price: 0.5234, change: 1.23 },
            ADA: { name: 'Cardano', symbol: 'ADA', icon: '₳', color: '#0033ad', price: 0.4521, change: -1.12 },
            DOGE: { name: 'Dogecoin', symbol: 'DOGE', icon: 'Ð', color: '#c2a633', price: 0.1234, change: 3.45 },
            DOT: { name: 'Polkadot', symbol: 'DOT', icon: '●', color: '#e6007a', price: 7.23, change: 0.89 },
            MATIC: { name: 'Polygon', symbol: 'MATIC', icon: '⬡', color: '#8247e5', price: 0.5678, change: 2.11 },
            LINK: { name: 'Chainlink', symbol: 'LINK', icon: '⬡', color: '#2a5ada', price: 14.56, change: 1.78 },
            AVAX: { name: 'Avalanche', symbol: 'AVAX', icon: '▲', color: '#e84142', price: 35.67, change: 4.23 },
            ATOM: { name: 'Cosmos', symbol: 'ATOM', icon: '⚛', color: '#2e3148', price: 9.12, change: -0.56 }
        };
        
        let holdings = [];
        let transactions = [];
        
        // Load from localStorage
        function loadData() {
            const savedHoldings = localStorage.getItem('cryptoHoldings');
            const savedTransactions = localStorage.getItem('cryptoTransactions');
            if (savedHoldings) holdings = JSON.parse(savedHoldings);
            if (savedTransactions) transactions = JSON.parse(savedTransactions);
            
            // Add some demo data if empty
            if (holdings.length === 0) {
                holdings = [
                    { symbol: 'BTC', amount: 0.5, buyPrice: 45000 },
                    { symbol: 'ETH', amount: 5, buyPrice: 2800 },
                    { symbol: 'SOL', amount: 25, buyPrice: 120 }
                ];
                saveData();
            }
        }
        
        function saveData() {
            localStorage.setItem('cryptoHoldings', JSON.stringify(holdings));
            localStorage.setItem('cryptoTransactions', JSON.stringify(transactions));
        }
        
        function renderCryptoSelect() {
            const select = document.getElementById('cryptoSelect');
            select.innerHTML = Object.entries(cryptoData).map(([symbol, data]) => 
                `<option value="${symbol}">${data.icon} ${data.name} (${symbol})</option>`
            ).join('');
        }
        
        function renderHoldings() {
            const list = document.getElementById('holdingsList');
            if (holdings.length === 0) {
                list.innerHTML = '<p style="text-align:center;opacity:0.5;padding:20px;">No holdings yet. Add your first crypto!</p>';
                return;
            }
            
            list.innerHTML = holdings.map(h => {
                const crypto = cryptoData[h.symbol];
                const currentValue = h.amount * crypto.price;
                const buyValue = h.amount * h.buyPrice;
                const pnl = currentValue - buyValue;
                const pnlPercent = ((currentValue - buyValue) / buyValue) * 100;
                
                return `
                    <div class="holding-card">
                        <div class="holding-icon" style="background: linear-gradient(135deg, ${crypto.color}, ${crypto.color}88)">${crypto.icon}</div>
                        <div class="holding-info">
                            <div class="holding-name">${crypto.name}</div>
                            <div class="holding-amount">${h.amount} ${crypto.symbol}</div>
                        </div>
                        <div class="holding-value">
                            <div class="holding-price">$${currentValue.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                            <div class="holding-change ${pnl >= 0 ? 'green' : 'red'}">
                                ${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)} (${pnlPercent.toFixed(1)}%)
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            updateSummary();
        }
        
        function updateSummary() {
            let totalValue = 0;
            let totalCost = 0;
            let bestPerformer = { symbol: '-', change: -Infinity };
            
            holdings.forEach(h => {
                const crypto = cryptoData[h.symbol];
                const value = h.amount * crypto.price;
                const cost = h.amount * h.buyPrice;
                totalValue += value;
                totalCost += cost;
                
                if (crypto.change > bestPerformer.change) {
                    bestPerformer = { symbol: h.symbol, change: crypto.change };
                }
            });
            
            const totalPnL = totalValue - totalCost;
            const totalChange = ((totalValue - totalCost) / totalCost) * 100;
            
            document.getElementById('totalValue').textContent = `$${totalValue.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            
            const changeEl = document.getElementById('totalChange');
            changeEl.textContent = `${totalPnL >= 0 ? '+' : ''}$${totalPnL.toFixed(2)} (${totalChange.toFixed(1)}%)`;
            changeEl.className = `value ${totalPnL >= 0 ? 'green' : 'red'}`;
            
            const best = cryptoData[bestPerformer.symbol];
            document.getElementById('bestPerformer').textContent = best ? `${best.icon} ${best.change > 0 ? '+' : ''}${best.change}%` : '-';
            
            const pnlEl = document.getElementById('totalPnL');
            pnlEl.textContent = `${totalPnL >= 0 ? '+' : ''}$${totalPnL.toFixed(2)}`;
            pnlEl.className = `value ${totalPnL >= 0 ? 'green' : 'red'}`;
        }
        
        function renderTransactions() {
            const list = document.getElementById('transactionList');
            if (transactions.length === 0) {
                list.innerHTML = '<p style="text-align:center;opacity:0.5;padding:15px;">No transactions yet</p>';
                return;
            }
            
            list.innerHTML = transactions.slice(0, 10).map(t => `
                <div class="transaction">
                    <span class="transaction-type ${t.type}">${t.type.toUpperCase()}</span>
                    <span>${t.amount} ${t.symbol}</span>
                    <span>$${t.value.toFixed(2)}</span>
                    <span style="opacity:0.5">${t.date}</span>
                </div>
            `).join('');
        }
        
        function renderTopGainers() {
            const sorted = Object.values(cryptoData).sort((a, b) => b.change - a.change).slice(0, 6);
            document.getElementById('topGainers').innerHTML = sorted.map(c => `
                <div class="gainer-card">
                    <div class="icon">${c.icon}</div>
                    <div class="name">${c.symbol}</div>
                    <div class="change">${c.change > 0 ? '+' : ''}${c.change}%</div>
                </div>
            `).join('');
        }
        
        function showAddModal() {
            document.getElementById('addModal').classList.add('show');
            document.getElementById('amount').value = '';
            document.getElementById('buyPrice').value = '';
        }
        
        function hideAddModal() {
            document.getElementById('addModal').classList.remove('show');
        }
        
        function addHolding() {
            const symbol = document.getElementById('cryptoSelect').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const buyPrice = parseFloat(document.getElementById('buyPrice').value);
            
            if (!amount || !buyPrice) {
                alert('Please fill in all fields');
                return;
            }
            
            const existing = holdings.find(h => h.symbol === symbol);
            if (existing) {
                existing.amount += amount;
                existing.buyPrice = ((existing.amount - amount) * existing.buyPrice + amount * buyPrice) / existing.amount;
            } else {
                holdings.push({ symbol, amount, buyPrice });
            }
            
            transactions.unshift({
                type: 'buy',
                symbol,
                amount,
                value: amount * buyPrice,
                date: new Date().toLocaleDateString()
            });
            
            saveData();
            renderHoldings();
            renderTransactions();
            hideAddModal();
        }
        
        function setTimeframe(tf) {
            document.querySelectorAll('.time-filters button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            // Would update chart here
        }
        
        // Draw simple chart
        function drawChart() {
            const canvas = document.getElementById('chart');
            const ctx = canvas.getContext('2d');
            const w = canvas.parentElement.clientWidth - 40;
            canvas.width = w;
            
            const data = [];
            let value = 10000;
            for (let i = 0; i < 30; i++) {
                value *= 1 + (Math.random() - 0.48) * 0.05;
                data.push(value);
            }
            
            const min = Math.min(...data) * 0.98;
            const max = Math.max(...data) * 1.02;
            const range = max - min;
            
            ctx.clearRect(0, 0, w, 150);
            ctx.beginPath();
            ctx.strokeStyle = '#3fb950';
            ctx.lineWidth = 2;
            
            data.forEach((v, i) => {
                const x = (i / (data.length - 1)) * w;
                const y = 150 - ((v - min) / range) * 130 - 10;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
            
            // Gradient fill
            ctx.lineTo(w, 150);
            ctx.lineTo(0, 150);
            ctx.closePath();
            const gradient = ctx.createLinearGradient(0, 0, 0, 150);
            gradient.addColorStop(0, 'rgba(63, 185, 80, 0.3)');
            gradient.addColorStop(1, 'rgba(63, 185, 80, 0)');
            ctx.fillStyle = gradient;
            ctx.fill();
        }
        
        // Initialize
        loadData();
        renderCryptoSelect();
        renderHoldings();
        renderTransactions();
        renderTopGainers();
        drawChart();
        
        window.addEventListener('resize', drawChart);
    </script>
</body>
</html>
