<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawBot Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Courier New', monospace;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(90deg, #161b22, #238636);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #30363d;
        }
        
        .header h1 {
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #58a6ff;
        }
        
        .stat-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #58a6ff;
        }
        
        .stat-label {
            opacity: 0.7;
            margin-top: 5px;
        }
        
        .section {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .section h2 {
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
            margin-bottom: 15px;
            color: #58a6ff;
        }
        
        .log-entry {
            padding: 8px 12px;
            margin: 5px 0;
            background: #0d1117;
            border-radius: 5px;
            font-size: 0.9em;
        }
        
        .log-entry.info { border-left: 3px solid #58a6ff; }
        .log-entry.success { border-left: 3px solid #238636; }
        .log-entry.warning { border-left: 3px solid #d29922; }
        .log-entry.error { border-left: 3px solid #f85149; }
        
        .progress-bar {
            background: #30363d;
            border-radius: 10px;
            height: 20px;
            margin: 10px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #238636, #58a6ff);
            transition: width 0.5s;
        }
        
        .btn {
            background: #238636;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin: 5px;
        }
        
        .btn:hover { background: #2ea043; }
        
        .footer {
            text-align: center;
            padding: 20px;
            opacity: 0.5;
            font-size: 0.8em;
        }
        
        #clock {
            font-size: 1.5em;
            color: #58a6ff;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 ClawBot Dashboard</h1>
        <p>Raspberry Pi 5 Monitor</p>
    </div>
    
    <div class="container">
        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">⏰</div>
                <div class="stat-value" id="clock">--:--:--</div>
                <div class="stat-label">System Time</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🖥️</div>
                <div class="stat-value" id="cpu">--%</div>
                <div class="stat-label">CPU Usage</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💾</div>
                <div class="stat-value" id="ram">--%</div>
                <div class="stat-label">RAM Usage</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💿</div>
                <div class="stat-value" id="disk">--%</div>
                <div class="stat-label">Disk Usage</div>
            </div>
        </div>
        
        <!-- System Info -->
        <div class="section">
            <h2>📊 System Details</h2>
            <div id="sysinfo">Loading...</div>
        </div>
        
        <!-- Activity Log -->
        <div class="section">
            <h2>📜 Activity Log</h2>
            <div id="activity">
                <div class="log-entry info">[INFO] Dashboard started</div>
            </div>
        </div>
        
        <!-- Quick Actions -->
        <div class="section">
            <h2>⚡ Quick Actions</h2>
            <button class="btn" onclick="refreshStats()">🔄 Refresh</button>
            <button class="btn" onclick="addLog('Test log entry', 'info')">➕ Add Log</button>
            <button class="btn" onclick="clearLogs()">🗑️ Clear Logs</button>
        </div>
    </div>
    
    <div class="footer">
        <p>🤖 ClawBot Dashboard | github.com/jnetai-clawbot</p>
    </div>
    
    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = 
                now.toLocaleTimeString();
        }
        
        async function refreshStats() {
            addLog('Refreshing system stats...', 'info');
            
            try {
                // Simulated stats (would fetch from API in production)
                document.getElementById('cpu').textContent = 
                    Math.floor(Math.random() * 30 + 10) + '%';
                document.getElementById('ram').textContent = 
                    Math.floor(Math.random() * 40 + 30) + '%';
                document.getElementById('disk').textContent = 
                    Math.floor(Math.random() * 20 + 40) + '%';
                
                addLog('Stats updated successfully', 'success');
            } catch (e) {
                addLog('Error fetching stats: ' + e.message, 'error');
            }
        }
        
        function addLog(message, type = 'info') {
            const log = document.getElementById('activity');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${message}`;
            log.insertBefore(entry, log.firstChild);
            
            // Keep only last 10 entries
            while (log.children.length > 10) {
                log.removeChild(log.lastChild);
            }
        }
        
        function clearLogs() {
            document.getElementById('activity').innerHTML = 
                '<div class="log-entry info">[INFO] Logs cleared</div>';
        }
        
        // Initialize
        setInterval(updateClock, 1000);
        updateClock();
        refreshStats();
        
        // Refresh stats every 30 seconds
        setInterval(refreshStats, 30000);
    </script>
</body>
</html>
