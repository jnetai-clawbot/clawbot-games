<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawBot Weather</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .weather-app {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #1e3c72;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8em;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        input {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }
        
        input:focus {
            border-color: #2a5298;
        }
        
        button {
            padding: 15px 25px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #1e3c72;
        }
        
        .weather-display {
            text-align: center;
            display: none;
        }
        
        .weather-display.show {
            display: block;
        }
        
        .city-name {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 10px;
        }
        
        .temperature {
            font-size: 4em;
            font-weight: bold;
            color: #1e3c72;
            line-height: 1;
        }
        
        .description {
            font-size: 1.2em;
            color: #666;
            margin: 10px 0;
            text-transform: capitalize;
        }
        
        .details {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .detail-item {
            text-align: center;
        }
        
        .detail-label {
            font-size: 0.8em;
            color: #999;
        }
        
        .detail-value {
            font-size: 1.2em;
            color: #333;
            font-weight: bold;
        }
        
        .weather-icon {
            font-size: 5em;
            margin: 20px 0;
        }
        
        .loading, .error {
            text-align: center;
            padding: 20px;
            display: none;
        }
        
        .loading.show, .error.show {
            display: block;
        }
        
        .error {
            color: #e74c3c;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.8em;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="weather-app">
        <h1>🌤️ ClawBot Weather</h1>
        
        <div class="search-box">
            <input type="text" id="city" placeholder="Enter city name..." value="London">
            <button onclick="getWeather()">Search</button>
        </div>
        
        <div class="loading" id="loading">
            <p>Loading weather data...</p>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="weather-display" id="weather">
            <div class="city-name" id="cityName"></div>
            <div class="weather-icon" id="icon"></div>
            <div class="temperature" id="temp"></div>
            <div class="description" id="desc"></div>
            
            <div class="details">
                <div class="detail-item">
                    <div class="detail-value" id="humidity"></div>
                    <div class="detail-label">Humidity</div>
                </div>
                <div class="detail-item">
                    <div class="detail-value" id="wind"></div>
                    <div class="detail-label">Wind</div>
                </div>
                <div class="detail-item">
                    <div class="detail-value" id="feels"></div>
                    <div class="detail-label">Feels Like</div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>🤖 Powered by ClawBot | github.com/jnetai-clawbot</p>
        </div>
    </div>
    
    <script>
        const API_KEY = ''; // Free API - uses wttr.in fallback
        
        async function getWeather() {
            const city = document.getElementById('city').value.trim();
            if (!city) return;
            
            showLoading();
            
            try {
                // Using wttr.in as free fallback
                const response = await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`);
                
                if (!response.ok) throw new Error('City not found');
                
                const data = await response.json();
                const current = data.current_condition[0];
                
                document.getElementById('cityName').textContent = city;
                document.getElementById('temp').textContent = current.temp_C + '°C';
                document.getElementById('desc').textContent = current.weatherDesc[0].value;
                document.getElementById('humidity').textContent = current.humidity + '%';
                document.getElementById('wind').textContent = current.windspeedKmph + ' km/h';
                document.getElementById('feels').textContent = current.FeelsLikeC + '°C';
                
                // Set weather icon
                const weatherCode = current.weatherCode;
                const icon = getWeatherIcon(weatherCode);
                document.getElementById('icon').textContent = icon;
                
                showWeather();
            } catch (err) {
                showError('Could not find weather for ' + city);
            }
        }
        
        function getWeatherIcon(code) {
            const icons = {
                '113': '☀️', '116': '⛅', '119': '☁️', '122': '☁️',
                '200': '⛈️', '227': '🌨️', '230': '❄️', '248': '🌫️',
                '260': '🌫️', '263': '🌧️', '266': '🌧️', '281': '🌧️',
                '302': '🌧️', '308': '🌧️', '350': '🌧️', '353': '🌦️',
                '356': '🌧️', '362': '🌧️', '365': '🌧️', '374': '🌧️',
                '377': '🌧️', '386': '⛈️', '389': '⛈️', '392': '⛈️',
                '395': '⛈️'
            };
            return icons[code] || '🌤️';
        }
        
        function showLoading() {
            document.getElementById('loading').classList.add('show');
            document.getElementById('weather').classList.remove('show');
            document.getElementById('error').classList.remove('show');
        }
        
        function showWeather() {
            document.getElementById('loading').classList.remove('show');
            document.getElementById('weather').classList.add('show');
            document.getElementById('error').classList.remove('show');
        }
        
        function showError(msg) {
            document.getElementById('loading').classList.remove('show');
            document.getElementById('weather').classList.remove('show');
            document.getElementById('error').textContent = msg;
            document.getElementById('error').classList.add('show');
        }
        
        // Allow Enter key
        document.getElementById('city').addEventListener('keypress', e => {
            if (e.key === 'Enter') getWeather();
        });
        
        // Load default city
        getWeather();
    </script>
</body>
</html>
